name: Construir y publicar imagen Docker

# Se ejecuta en cada push a main (o a mano desde la pestaña Actions).
# Construye la imagen y la publica en GHCR, lista para que el Synology la descargue.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Synology con Docker suele ser Intel (amd64). Si tu NAS es ARM,
          # cambia esto por: linux/amd64,linux/arm64
          platforms: linux/amd64
          tags: |
            ghcr.io/foreverramone/aula-pensamiento-critico:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
