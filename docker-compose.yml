services:
  aula:
    # Imagen ya construida y publicada automáticamente por GitHub Actions.
    # El Synology solo la descarga: no construye nada (ni LibreOffice ni npm).
    image: ghcr.io/foreverramone/aula-pensamiento-critico:latest
    container_name: aula-pensamiento-critico
    restart: unless-stopped
    pull_policy: always
    ports:
      # HOST_PORT = puerto en el Synology (cámbialo si el 8080 está ocupado).
      # El 3000 de la derecha es el interno: no lo toques.
      - "${HOST_PORT:-8080}:3000"
    volumes:
      # Volumen con nombre: aquí viven la base de datos y los archivos subidos.
      # Sobrevive a reinicios y actualizaciones del contenedor.
      - aula-data:/data
    environment:
      # Estas variables las puedes fijar desde Portainer (sección "Environment
      # variables") o desde un archivo .env. Si no las defines, se usan los
      # valores por defecto de la derecha (que DEBES cambiar antes de usarlo).
      - SITE_NAME=${SITE_NAME:-Del ChatGPT al pensamiento crítico}
      # Código que repartes a los participantes para registrarse. CÁMBIALO.
      - INVITE_CODE=${INVITE_CODE:-cambia-este-codigo}
      # Tu email: quedará como administrador al registrarte. PON EL TUYO.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-tu-email@ejemplo.com}
      # Frase larga y secreta para firmar las sesiones. CÁMBIALA.
      - SESSION_SECRET=${SESSION_SECRET:-cambia-esto-por-una-frase-larga-y-secreta}
      # Número de sesiones del curso (por defecto 5).
      - NUM_SESSIONS=${NUM_SESSIONS:-5}

volumes:
  aula-data:
